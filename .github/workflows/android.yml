name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -L https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Generate signing key
        run: |
          if [ ! -f app/release-key.jks ]; then
            echo "Generating debug signing key..."
            keytool -genkey -v \
              -keystore app/release-key.jks \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US" \
              -deststoretype pkcs12
          fi

      - name: Validate required dependency files
        run: |
          echo "Checking libzt-release.aar..."
          test -f app/libs/libzt-release.aar || { echo "Missing: app/libs/libzt-release.aar"; exit 1; }

          echo "Checking pylon_arm64 binary..."
          test -f app/src/main/assets/bin/pylon_arm64 || { echo "Missing: app/src/main/assets/bin/pylon_arm64"; exit 1; }

          echo "All required files present."

      - name: Build release APK
        env:
          KEY_STORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: zerotierproxy-arm64-v8a-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error