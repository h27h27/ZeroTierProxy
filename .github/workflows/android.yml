name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate required dependency files
        run: |
          echo "Checking libzt-release.aar..."
          test -f app/libs/libzt-release.aar || { echo "Missing: app/libs/libzt-release.aar"; exit 1; }

          echo "Checking pylon_arm64 binary..."
          test -f app/src/main/assets/bin/pylon_arm64 || { echo "Missing: app/src/main/assets/bin/pylon_arm64"; exit 1; }

          echo "All required files present."

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          # Download the gradle-wrapper.jar for Gradle 8.7
          curl -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle-8.7-bin.zip
          unzip gradle-8.7-bin.zip
          cp gradle-8.7/lib/plugins/gradle-wrapper-8.7.jar gradle/wrapper/gradle-wrapper.jar
          rm -rf gradle-8.7 gradle-8.7-bin.zip

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: zerotierproxy-arm64-v8a-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
